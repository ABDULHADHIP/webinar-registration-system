<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shirt Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1520975922325-4d87b94c9e5f') no-repeat center/cover;
            height: 400px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: 2px 2px 5px black;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: red;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .hero button:hover {
            background: darkred;
        }

        .products {
            display: flex;
            justify-content: space-around;
            padding: 30px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>👕 Shirt Shop</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h1>Welcome to Shirt Store</h1>
    <p>Best Quality Shirts at Best Price</p>
    <button>Shop Now</button>
</div>

<div class="products">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1602810319428-019690571b5b">
        <h3>Casual Shirt</h3>
        <p>₹799</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1586790170083-2f9ceadc732d">
        <h3>Formal Shirt</h3>
        <p>₹999</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1598033129183-c4f50c736f10">
        <h3>Printed Shirt</h3>
        <p>₹899</p>
    </div>
</div>

<footer>
    © 2026 Shirt Shop | All Rights Reserved
</footer>

</body>
</html>
